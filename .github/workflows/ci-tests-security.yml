name: CI - Tests and Security

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write
  id-token: write

concurrency:
  group: ci-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality:
    name: Quality checks (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend-nestjs/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm --prefix backend-nestjs ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Run quality gate
        run: npm run ci:quality

  i18n_validation:
    name: i18n validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Run i18n validation gate
        run: npm run ci:i18n

  backend_unit_security:
    name: Backend unit + security tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend-nestjs/package-lock.json

      - name: Install backend dependencies
        run: npm --prefix backend-nestjs ci

      - name: Run backend core test phase
        env:
          DB_TYPE: postgres
          ENABLE_TESTCONTAINERS: "true"
        run: npm run ci:backend-core

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend-nestjs/coverage
          if-no-files-found: warn

  backend_integration:
    name: Backend integration tests (testcontainers)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend-nestjs/package-lock.json

      - name: Install backend dependencies
        run: npm --prefix backend-nestjs ci

      - name: Run integration tests
        env:
          DB_TYPE: postgres
          ENABLE_TESTCONTAINERS: "true"
          TESTCONTAINERS_RYUK_DISABLED: "false"
          TESTCONTAINERS_START_TIMEOUT_MS: "180000"
        run: npm run ci:backend-integration

  backend_e2e:
    name: Backend e2e tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend-nestjs/package-lock.json

      - name: Install backend dependencies
        run: npm --prefix backend-nestjs ci

      - name: Run backend e2e tests
        shell: bash
        env:
          NODE_ENV: test
        run: |
          mkdir -p reports/backend-e2e
          set -o pipefail
          npm run ci:backend-e2e -- --json --outputFile=../reports/backend-e2e/jest-results.json 2>&1 | tee reports/backend-e2e/backend-e2e.log

      - name: Upload backend e2e artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-e2e-artifacts
          path: reports/backend-e2e
          if-no-files-found: warn

  frontend_unit:
    name: Frontend unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Run frontend unit tests
        run: npm run ci:frontend-unit

  web_e2e:
    name: Web E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run web E2E
        env:
          E2E_USE_LOCAL_SERVER: "true"
        run: npm run ci:web-e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: reports/playwright
          if-no-files-found: warn

  api_newman:
    name: API collection tests (Newman)
    runs-on: ubuntu-latest
    needs: [backend_unit_security]
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cal3_ci
          POSTGRES_PASSWORD: cal3_ci
          POSTGRES_DB: cal3_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cal3_ci -d cal3_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend-nestjs/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm --prefix backend-nestjs ci

      - name: Start backend for API tests
        working-directory: backend-nestjs
        env:
          DB_TYPE: postgres
          DB_HOST: 127.0.0.1
          DB_PORT: "5432"
          DB_USERNAME: cal3_ci
          DB_PASSWORD: cal3_ci
          DB_NAME: cal3_ci
          DB_SSL: "false"
          DB_SYNCHRONIZE: "true"
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret
          SECURITY_ALLOWED_ORIGINS: http://localhost:3000
          BACKEND_PORT: "8081"
          PORT: "8081"
          BIND_ADDRESS: "127.0.0.1"
          HOST: "127.0.0.1"
        run: |
          npm run start > ../backend-test.log 2>&1 &
          echo $! > ../backend-test.pid

      - name: Wait for backend
        run: |
          npx wait-on --timeout 120000 --interval 1000 --httpTimeout 5000 http-get://127.0.0.1:8081/api/health || {
            echo "Backend did not become healthy in time";
            test -f backend-test.log && tail -n 200 backend-test.log;
            test -f backend-test.pid && kill "$(cat backend-test.pid)" || true;
            exit 1;
          }

      - name: Run Newman collection
        run: |
          SUFFIX="$(date +%s)"
          npm run ci:api -- \
            --env-var "username=newman_${SUFFIX}" \
            --env-var "registerEmail=newman_${SUFFIX}@example.com" \
            --env-var "password=AdminPass#123"

      - name: Stop backend test server
        if: always()
        run: |
          test -f backend-test.pid && kill "$(cat backend-test.pid)" || true

      - name: Upload Newman report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: reports/newman-report.html
          if-no-files-found: warn

      - name: Upload backend test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-log
          path: backend-test.log
          if-no-files-found: warn

  load_smoke:
    name: Load smoke tests (Artillery)
    runs-on: ubuntu-latest
    needs: [backend_unit_security]
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cal3_ci
          POSTGRES_PASSWORD: cal3_ci
          POSTGRES_DB: cal3_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cal3_ci -d cal3_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend-nestjs/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm --prefix backend-nestjs ci

      - name: Start backend for load smoke
        working-directory: backend-nestjs
        env:
          DB_TYPE: postgres
          DB_HOST: 127.0.0.1
          DB_PORT: "5432"
          DB_USERNAME: cal3_ci
          DB_PASSWORD: cal3_ci
          DB_NAME: cal3_ci
          DB_SSL: "false"
          DB_SYNCHRONIZE: "true"
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret
          SECURITY_ALLOWED_ORIGINS: http://localhost:3000
          BACKEND_PORT: "8081"
          PORT: "8081"
          BIND_ADDRESS: "127.0.0.1"
          HOST: "127.0.0.1"
        run: |
          npm run start > ../backend-load.log 2>&1 &
          echo $! > ../backend-load.pid

      - name: Wait for backend
        run: |
          npx wait-on --timeout 120000 --interval 1000 --httpTimeout 5000 http-get://127.0.0.1:8081/api/health || {
            echo "Backend did not become healthy in time";
            test -f backend-load.log && tail -n 200 backend-load.log;
            test -f backend-load.pid && kill "$(cat backend-load.pid)" || true;
            exit 1;
          }

      - name: Run Artillery smoke
        env:
          LOAD_BASE_URL: http://127.0.0.1:8081
        run: npm run ci:load

      - name: Stop backend load server
        if: always()
        run: |
          test -f backend-load.pid && kill "$(cat backend-load.pid)" || true

      - name: Upload load log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-load-log
          path: backend-load.log
          if-no-files-found: warn

  security_zap:
    name: OWASP ZAP baseline scan
    runs-on: ubuntu-latest
    needs: [backend_unit_security]
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cal3_ci
          POSTGRES_PASSWORD: cal3_ci
          POSTGRES_DB: cal3_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cal3_ci -d cal3_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend-nestjs/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm --prefix backend-nestjs ci

      - name: Start backend for ZAP
        working-directory: backend-nestjs
        env:
          DB_TYPE: postgres
          DB_HOST: 127.0.0.1
          DB_PORT: "5432"
          DB_USERNAME: cal3_ci
          DB_PASSWORD: cal3_ci
          DB_NAME: cal3_ci
          DB_SSL: "false"
          DB_SYNCHRONIZE: "true"
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret
          SECURITY_ALLOWED_ORIGINS: http://localhost:3000
          BACKEND_PORT: "8081"
          PORT: "8081"
          BIND_ADDRESS: "0.0.0.0"
          HOST: "0.0.0.0"
        run: |
          npm run start > ../backend-zap.log 2>&1 &
          echo $! > ../backend-zap.pid

      - name: Wait for backend
        run: |
          npx wait-on --timeout 120000 --interval 1000 --httpTimeout 5000 http-get://127.0.0.1:8081/api/health || {
            echo "Backend did not become healthy in time";
            test -f backend-zap.log && tail -n 200 backend-zap.log;
            test -f backend-zap.pid && kill "$(cat backend-zap.pid)" || true;
            exit 1;
          }

      - name: Run ZAP scan
        env:
          ZAP_TARGET_URL: http://127.0.0.1:8081
          ZAP_FAIL_ON_RISK: critical
        run: npm run ci:zap

      - name: Stop backend ZAP server
        if: always()
        run: |
          test -f backend-zap.pid && kill "$(cat backend-zap.pid)" || true

      - name: Upload backend ZAP log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-zap-log
          path: backend-zap.log
          if-no-files-found: warn

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: reports/security
          if-no-files-found: warn

  azure_smoke:
    name: Azure smoke checks
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Azure smoke prerequisites
        id: azure_smoke_prereqs
        shell: bash
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          if [[ -n "${AZURE_CREDENTIALS}" ]]; then
            echo "has_azure_credentials=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_azure_credentials=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Azure login
        if: ${{ steps.azure_smoke_prereqs.outputs.has_azure_credentials == 'true' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Azure subscription
        if: ${{ vars.AZ_SUBSCRIPTION_ID != '' && steps.azure_smoke_prereqs.outputs.has_azure_credentials == 'true' }}
        run: az account set --subscription "${{ vars.AZ_SUBSCRIPTION_ID }}"

      - name: Backend health check
        if: ${{ vars.CAL3_BACKEND_URL != '' }}
        run: curl -f "${{ vars.CAL3_BACKEND_URL }}/api/health"

      - name: Frontend health check
        if: ${{ vars.CAL3_FRONTEND_URL != '' }}
        run: curl -f "${{ vars.CAL3_FRONTEND_URL }}"
