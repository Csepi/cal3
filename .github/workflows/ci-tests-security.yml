name: CI - Tests and Security

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write
  id-token: write

concurrency:
  group: ci-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend_unit_security:
    name: Backend unit + security tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: backend-nestjs/package-lock.json

      - name: Install backend dependencies
        run: npm --prefix backend-nestjs ci

      - name: Run backend unit tests
        run: npm --prefix backend-nestjs run test:unit

      - name: Run backend security tests
        run: npm --prefix backend-nestjs run test:security

      - name: Audit SQL query interpolation safety
        run: npm --prefix backend-nestjs run db:audit:queries

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend-nestjs/coverage
          if-no-files-found: warn

  backend_integration:
    name: Backend integration tests (testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: backend-nestjs/package-lock.json

      - name: Install backend dependencies
        run: npm --prefix backend-nestjs ci

      - name: Run integration tests
        env:
          ENABLE_TESTCONTAINERS: "true"
          TESTCONTAINERS_RYUK_DISABLED: "false"
          TESTCONTAINERS_START_TIMEOUT_MS: "180000"
        run: npm --prefix backend-nestjs run test:integration

  frontend_unit:
    name: Frontend unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Run frontend tests with coverage
        run: npm --prefix frontend run test:cov

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
          if-no-files-found: warn

  web_e2e:
    name: Web E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run web E2E
        env:
          E2E_USE_LOCAL_SERVER: "true"
        run: npm run test:e2e:web

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: reports/playwright
          if-no-files-found: warn

  api_newman:
    name: API collection tests (Newman)
    runs-on: ubuntu-latest
    needs: [backend_unit_security]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend-nestjs/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm --prefix backend-nestjs ci

      - name: Start backend for API tests
        run: |
          DB_TYPE=sqlite \
          DB_DATABASE=:memory: \
          DB_SYNCHRONIZE=true \
          JWT_SECRET=test-jwt-secret \
          SECURITY_ALLOWED_ORIGINS=http://localhost:3000 \
          npm --prefix backend-nestjs run start:dev > backend-test.log 2>&1 &

      - name: Wait for backend
        run: npx wait-on http://127.0.0.1:8081/api/health

      - name: Run Newman collection
        run: npm run test:api

      - name: Upload Newman report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: reports/newman-report.html
          if-no-files-found: warn

      - name: Upload backend test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-log
          path: backend-test.log
          if-no-files-found: warn

  load_smoke:
    name: Load smoke tests (Artillery)
    runs-on: ubuntu-latest
    needs: [backend_unit_security]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend-nestjs/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm --prefix backend-nestjs ci

      - name: Start backend for load smoke
        run: |
          DB_TYPE=sqlite \
          DB_DATABASE=:memory: \
          DB_SYNCHRONIZE=true \
          JWT_SECRET=test-jwt-secret \
          SECURITY_ALLOWED_ORIGINS=http://localhost:3000 \
          npm --prefix backend-nestjs run start:dev > backend-load.log 2>&1 &

      - name: Wait for backend
        run: npx wait-on http://127.0.0.1:8081/api/health

      - name: Run Artillery smoke
        env:
          LOAD_BASE_URL: http://127.0.0.1:8081
        run: npm run test:load

      - name: Upload load log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-load-log
          path: backend-load.log
          if-no-files-found: warn

  security_zap:
    name: OWASP ZAP baseline scan
    runs-on: ubuntu-latest
    needs: [backend_unit_security]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend-nestjs/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm --prefix backend-nestjs ci

      - name: Start backend for ZAP
        run: |
          DB_TYPE=sqlite \
          DB_DATABASE=:memory: \
          DB_SYNCHRONIZE=true \
          JWT_SECRET=test-jwt-secret \
          SECURITY_ALLOWED_ORIGINS=http://localhost:3000 \
          npm --prefix backend-nestjs run start:dev > backend-zap.log 2>&1 &

      - name: Wait for backend
        run: npx wait-on http://127.0.0.1:8081/api/health

      - name: Run ZAP scan
        env:
          ZAP_TARGET_URL: http://127.0.0.1:8081
          ZAP_FAIL_ON_RISK: high
        run: npm run test:security:web

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: reports/security
          if-no-files-found: warn

  azure_smoke:
    name: Azure smoke checks
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        if: ${{ secrets.AZURE_CREDENTIALS != '' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Azure subscription
        if: ${{ vars.AZ_SUBSCRIPTION_ID != '' && secrets.AZURE_CREDENTIALS != '' }}
        run: az account set --subscription "${{ vars.AZ_SUBSCRIPTION_ID }}"

      - name: Backend health check
        if: ${{ vars.CAL3_BACKEND_URL != '' }}
        run: curl -f "${{ vars.CAL3_BACKEND_URL }}/api/health"

      - name: Frontend health check
        if: ${{ vars.CAL3_FRONTEND_URL != '' }}
        run: curl -f "${{ vars.CAL3_FRONTEND_URL }}"
